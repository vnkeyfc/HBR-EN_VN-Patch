#############################################################################################
#																							#
# 					HBRTLFixUp plugin config												#
# 					Use True or False. Lines starting with # are ignored.					#
# 					Đừng chỉnh gì trong đây nếu bạn biết mình đang làm gì!					#
#																							#
#############################################################################################

# Enable text override rules from BepInEx/Translation/vi/Overrides/*.txt (This option should be always True)
EnableTextOverride=True

# Replace Lua scripts with edited .lua files from BepInEx/Translation/vi/TextAsset/DecodedLua
EnableLuaOverride=True

# Dump decrypted Lua scripts to BepInEx/Translation/vi/TextAsset/DecodedLua
EnableLuaDump=False

# Preload XUnity text cache before typewriter starts so translated text is revealed immediately.
# Disable this when you need XUnity Alt+T to behave closer to stock behavior for debugging.
EnableTypewriterPreTranslate=True

# Suppress noisy XUnity.AutoTranslator regex-related log lines.
SuppressXuatRegexLogs=True

# Dump lottery movie lyrics returned by LyricsPlayer.GetLyricsText to BepInEx/Translation/vi/TextAsset/LyricsDump
EnableLyricsDump=False

# Override lottery movie lyrics from BepInEx/Translation/vi/TextAsset/LyricsDump/*.json
EnableLyricsOverride=True

# Dump MasterLocalize da duoc game giai ma thanh JSON.
EnableMasterBinDump=False

# Override UI theo Label/Text trong MasterBinDump/MasterLocalize.json.
EnableMasterBinOverride=False

# Đổi dấu phân cách số kiểu en-US sang kiểu Việt Nam trong text UI động.
UseVietnameseNumberSeparators=True

# Giữ canh phải và chỉnh khoảng cách ký tự cho số ngày/giờ Story.
AdjustStorySelectorNumberSpacing=True
StorySelectorNumberCharacterSpacing=0
StorySelectorNumberLeftOffset=10
StoryHourCharacterSpacing=55
StoryHourLeftOffset=6
StoryMinuteCharacterSpacing=54
StoryMinuteLeftOffset=8

# Chỉnh size và khoảng cách dòng cho nội dung ADV backlog.
AdjustAdvBackLogText=True
AdvBackLogFontSize=30
AdvBackLogLineSpacing=-20

# Chỉnh font size và vị trí text typewriter bên dưới Main/Lua.
AdjustLuaTypewriterText=True
LuaTypewriterPathPrefix=/RootView/UI-Foreground/Main/Lua/
# Font size dùng đồng thời cho bộ đo xuống dòng và text hiển thị.
LuaTypewriterFontSize=41
# Số dương đẩy text lên, số âm hạ text xuống.
LuaTypewriterPositionYOffset=0

# Character spacing riêng cho UIDayResult2 episodeNum.
StoryEpisodeCharacterSpacing=21
StoryEpisodeLeftOffset=0

